{% extends "base.html" %}
{% block content %}
<form action="{{ url_for('search') }}" method="GET" class="search-bar">
  <input type="text" name="q" placeholder="search movies, genres..." value="{{ search_query or '' }}">
  <button type="submit" style="background:none;border:none;color:#fff;cursor:pointer;">🔍</button>
</form>

<div class="filter-tabs">
  <a href="{{ url_for('home') }}" class="{{ 'active' if not industry_filter else '' }}">all</a>
  <a href="{{ url_for('filter_industry', industry='Hollywood') }}" class="{{ 'active' if industry_filter == 'Hollywood' else '' }}">hollywood</a>
  <a href="{{ url_for('filter_industry', industry='Bollywood') }}" class="{{ 'active' if industry_filter == 'Bollywood' else '' }}">bollywood</a>
</div>

<div class="section-title">{{ page_title or 'top picks' }}</div>

<div class="movie-grid">
  {% for movie in movies %}
  <a href="{{ url_for('movie_detail', movie_id=movie.id) }}">
    <div class="movie-card">
        <div class="poster">
  <span class="industry-badge {{ 'badge-bollywood' if movie.industry == 'Bollywood' else 'badge-hollywood' }}">{{ movie.industry }}</span>
  <img src="https://placehold.co/300x450/1a1033/ffffff?font=poppins&text={{ movie.title | urlencode }}" alt="{{ movie.title }}">
</div>
    <div class="info">
        <h4>{{ movie.title }}</h4>
        <p><span class="star">★</span> {{ movie.rating }} &middot; {{ movie.genres.split(' ')[0] }}</p>
      </div>
    </div>
  </a>
  {% else %}
  <p style="color:#a89fd0;">no movies found.</p>
  {% endfor %}
</div>
{% endblock %}
